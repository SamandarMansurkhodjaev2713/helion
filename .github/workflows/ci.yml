name: CI

# Quality gate for pull requests and feature branches: strict type-check + full
# production build. Pushes to main are covered by deploy.yml (which also builds).

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check (strict, no emit)
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
